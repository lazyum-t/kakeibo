<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>家計簿</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');

  :root {
    --bg:#F2F4F7; --surface:#FFFFFF; --surface2:#F8F9FB; --border:#E8EBF0;
    --text:#0F1923; --text2:#6B7A8D; --text3:#A8B3C0;
    --accent:#2563EB; --accent-light:#EFF4FF;
    --red:#E53935; --red-light:#FEF0EF;
    --green:#1AAD5E; --green-light:#EDFAF3;
    --yellow:#F59E0B; --yellow-light:#FFFBEB;
    --shadow-sm:0 1px 4px rgba(15,25,35,.07); --shadow:0 2px 12px rgba(15,25,35,.09);
    --r:14px; --r-sm:10px; --tab-h:64px; --header-h:56px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;overscroll-behavior:none;}
  #app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

  .header{height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;box-shadow:var(--shadow-sm);position:relative;z-index:50;}
  .header-title{font-size:17px;font-weight:900;color:var(--text);flex:1;}
  .header-month{display:flex;align-items:center;gap:2px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 6px;}
  .header-month-label{font-size:14px;font-weight:700;min-width:72px;text-align:center;color:var(--text);}
  .month-arrow{width:28px;height:28px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text2);border-radius:50%;}
  .month-arrow:active{background:var(--border);}
  .header-btn{width:32px;height:32px;border:1px solid var(--border);background:var(--surface);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .header-btn:active{background:var(--accent-light);}

  .page-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
  .page-content::-webkit-scrollbar{display:none;}
  .page{display:none;padding:12px 12px 24px;}
  .page.active{display:block;}

  .summary-strip{background:var(--surface);border-radius:var(--r);padding:14px 16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:12px;box-shadow:var(--shadow-sm);}
  .sum-item{text-align:center;}
  .sum-label{font-size:10px;color:var(--text3);font-weight:500;margin-bottom:3px;}
  .sum-val{font-size:15px;font-weight:700;}
  .sum-val.income{color:var(--green);} .sum-val.expense{color:var(--red);} .sum-val.balance{color:var(--accent);}

  .sub-tabs{display:flex;background:var(--surface);border-radius:var(--r-sm);padding:3px;margin-bottom:12px;box-shadow:var(--shadow-sm);}
  .sub-tab{flex:1;padding:8px 6px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:var(--text2);border-radius:8px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px;}
  .sub-tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.25);}
  .sub-tab .dot{width:7px;height:7px;border-radius:50%;}

  .section-card{background:var(--surface);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-sm);margin-bottom:10px;}
  .section-card-header{padding:11px 14px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .section-card-title{font-size:12px;font-weight:700;color:var(--text2);display:flex;align-items:center;gap:6px;}
  .section-card-total{font-size:15px;font-weight:700;}
  .section-card-total.expense{color:var(--red);} .section-card-total.income{color:var(--green);}

  .expense-row{padding:8px 10px 8px 6px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:6px;}
  .expense-row:last-child{border-bottom:none;}
  .expense-row-top{display:grid;grid-template-columns:36px 1fr 28px;align-items:center;gap:6px;}
  .expense-row-bottom{display:grid;grid-template-columns:1fr auto;align-items:center;gap:6px;padding-left:42px;}
  .day-badge{width:30px;height:30px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--text2);flex-shrink:0;}
  .day-badge input[type="number"]{width:100%;height:100%;border:none;background:transparent;text-align:center;font-family:inherit;font-size:13px;font-weight:700;color:var(--text2);outline:none;padding:0;}
  .item-input{border:none;background:transparent;font-family:inherit;font-size:13px;color:var(--text);outline:none;width:100%;padding:4px 0;}
  .item-input::placeholder{color:var(--text3);}
  .del-btn{width:28px;height:28px;border:none;background:none;cursor:pointer;color:var(--text3);border-radius:6px;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .del-btn:active{background:var(--red-light);color:var(--red);}
  .card-select{border:1px solid var(--border);background:var(--surface2);border-radius:8px;padding:5px 22px 5px 6px;font-family:inherit;font-size:11px;font-weight:600;color:var(--text2);outline:none;cursor:pointer;max-width:160px;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23A8B3C0' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 7px center;}
  .card-select:focus{border-color:var(--accent);}
  .amount-input-wrap{display:flex;align-items:center;gap:2px;}
  .yen-sym{font-size:11px;color:var(--text3);}
  .amount-input{border:none;background:transparent;font-family:inherit;font-size:14px;font-weight:700;color:var(--text);text-align:right;outline:none;width:90px;}
  .amount-input::placeholder{color:var(--text3);font-weight:400;}

  .income-row-item{display:grid;grid-template-columns:1fr auto;align-items:center;padding:0 10px 0 14px;border-bottom:1px solid var(--border);min-height:48px;gap:6px;}
  .income-row-item:last-child{border-bottom:none;}
  .income-source-label{font-size:13px;font-weight:600;color:var(--text);}
  .income-amount-input{border:none;background:transparent;font-family:inherit;font-size:14px;font-weight:700;color:var(--green);text-align:right;outline:none;width:110px;}
  .income-amount-input::placeholder{color:var(--text3);font-weight:400;}

  .add-row-btn{width:100%;padding:11px 14px;background:none;border:none;border-top:1px dashed var(--border);cursor:pointer;color:var(--accent);font-size:13px;font-family:inherit;font-weight:600;text-align:left;display:flex;align-items:center;gap:6px;}
  .add-row-btn:active{background:var(--accent-light);}

  .sim-balance-card{background:linear-gradient(135deg,#1d4ed8,#2563eb);border-radius:var(--r);padding:18px 16px;margin-bottom:12px;color:#fff;box-shadow:0 4px 20px rgba(37,99,235,.3);}
  .sim-balance-label{font-size:11px;opacity:.8;margin-bottom:4px;}
  .sim-balance-row{display:flex;align-items:center;gap:8px;}
  .sim-balance-input{font-size:26px;font-weight:900;background:transparent;border:none;color:#fff;font-family:inherit;outline:none;flex:1;min-width:0;}
  .sim-recalc-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;padding:7px 14px;border-radius:20px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
  .sim-recalc-btn:active{background:rgba(255,255,255,.35);}
  .sim-list-card{background:var(--surface);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-sm);}
  .sim-month-header{background:var(--accent-light);padding:7px 14px;font-size:11px;font-weight:700;color:var(--accent);border-bottom:1px solid var(--border);}
  .sim-row{display:grid;grid-template-columns:72px 1fr 84px;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);gap:8px;}
  .sim-row:last-child{border-bottom:none;}
  .sim-row.today-row{background:var(--yellow-light);border-left:3px solid var(--yellow);}
  .sim-row.warn-row{background:var(--red-light);border-left:3px solid var(--red);}
  .sim-date{font-size:11px;font-weight:700;color:var(--text2);}
  .sim-name{font-size:13px;color:var(--text);}
  .sim-bal-wrap{text-align:right;}
  .sim-amount{font-size:11px;font-weight:700;}
  .sim-amount.neg{color:var(--red);} .sim-amount.pos{color:var(--green);}
  .sim-bal{font-size:13px;font-weight:700;color:var(--text);}
  .sim-bal.warn{color:var(--red);}

  .settings-section{background:var(--surface);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-sm);margin-bottom:16px;}
  .settings-section-title{padding:11px 14px;font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--surface2);}
  .settings-item{display:flex;align-items:center;padding:13px 14px;border-bottom:1px solid var(--border);gap:10px;}
  .settings-item:last-of-type{border-bottom:none;}
  .settings-item-info{flex:1;min-width:0;}
  .settings-item-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .settings-item-sub{font-size:11px;color:var(--text2);}
  .settings-item-actions{display:flex;gap:6px;flex-shrink:0;}
  .settings-btn{padding:6px 12px;border-radius:8px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;border:none;}
  .settings-btn.edit{background:var(--accent-light);color:var(--accent);}
  .settings-btn.del{background:var(--red-light);color:var(--red);}
  .settings-add-row{width:100%;padding:12px 14px;background:none;border:none;border-top:1px dashed var(--border);cursor:pointer;color:var(--accent);font-size:13px;font-family:inherit;font-weight:600;text-align:left;display:flex;align-items:center;gap:6px;}
  .settings-add-row:active{background:var(--accent-light);}
  .settings-page-save{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;box-shadow:0 4px 14px rgba(37,99,235,.3);}
  .data-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
  .data-action-btn{padding:12px 8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;color:var(--text2);text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;box-shadow:var(--shadow-sm);}
  .data-action-btn span{font-size:18px;}
  .data-action-btn:active{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
  .data-action-btn.danger:active{background:var(--red-light);border-color:var(--red);color:var(--red);}
  .save-ts{text-align:center;font-size:11px;color:var(--text3);margin-bottom:16px;}

  .tab-bar{height:var(--tab-h);background:var(--surface);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(3,1fr);align-items:center;flex-shrink:0;box-shadow:0 -2px 12px rgba(15,25,35,.07);}
  .tab-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 0;border:none;background:none;cursor:pointer;font-family:inherit;color:var(--text3);transition:color .15s;}
  .tab-btn.active{color:var(--accent);}
  .tab-btn .tab-icon{font-size:20px;line-height:1;}
  .tab-btn .tab-label{font-size:10px;font-weight:600;}
  .tab-btn .tab-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);margin-top:1px;opacity:0;transition:opacity .15s;}
  .tab-btn.active .tab-dot{opacity:1;}

  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:flex-end;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,0);animation:slideUp .25s ease;}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 16px;}
  .modal-title{font-size:16px;font-weight:700;padding:0 16px 14px;border-bottom:1px solid var(--border);}
  .modal-body{padding:16px;}
  .modal-footer{padding:12px 16px 16px;display:flex;flex-direction:column;gap:8px;}
  .form-row{margin-bottom:14px;}
  .form-label{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;display:block;}
  .form-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 12px;font-family:inherit;font-size:15px;color:var(--text);background:var(--surface);outline:none;transition:border-color .15s;}
  .form-input:focus{border-color:var(--accent);}
  .form-row-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .form-row-3col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  .modal-btn-primary{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;}
  .modal-btn-primary:active{opacity:.9;}
  .modal-btn-ghost{width:100%;padding:14px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);border-radius:12px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;}
  .modal-btn-danger{width:100%;padding:14px;background:var(--red-light);color:var(--red);border:none;border-radius:12px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;}

  .dup-msg{font-size:14px;color:var(--text);line-height:1.6;margin-bottom:16px;}
  .dup-highlight{font-weight:700;color:var(--accent);}
  .modal-btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

  #calc-modal .modal{border-radius:20px 20px 0 0;overflow:hidden;}
  .calc-display{background:var(--text);color:#fff;padding:16px 18px 12px;min-height:88px;display:flex;flex-direction:column;justify-content:flex-end;align-items:flex-end;gap:4px;}
  .calc-expr{font-size:13px;color:var(--text3);min-height:18px;word-break:break-all;text-align:right;}
  .calc-val{font-size:32px;font-weight:900;letter-spacing:-.5px;word-break:break-all;text-align:right;}
  .calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);}
  .calc-btn{border:none;padding:0;height:64px;font-family:inherit;font-size:18px;font-weight:700;cursor:pointer;background:var(--surface);color:var(--text);transition:background .1s;display:flex;align-items:center;justify-content:center;}
  .calc-btn:active{opacity:.75;}
  .calc-btn.op{background:var(--surface2);color:var(--accent);}
  .calc-btn.eq{background:var(--accent);color:#fff;font-size:22px;}
  .calc-btn.fn{background:var(--surface2);color:var(--text2);font-size:14px;}
  .calc-btn.zero{grid-column:span 2;}
  .calc-footer{padding:12px 16px 16px;display:flex;flex-direction:column;gap:8px;background:var(--surface);}
  .calc-use-btn{width:100%;padding:14px;background:var(--green);color:#fff;border:none;border-radius:12px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;}
  .calc-use-btn:active{opacity:.9;}

  .toast{position:fixed;bottom:calc(var(--tab-h)+16px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast.success{background:var(--green);}
  .toast.error{background:var(--red);}
  .toast.warn{background:var(--yellow);color:var(--text);}

  /* 締め日 末日チェックボックス行 */
  .close-last-row{display:flex;align-items:center;gap:6px;margin-top:6px;}
  .close-last-row label{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px;cursor:pointer;}
</style>
</head>
<body>
<div id="app">

  <header class="header">
    <div class="header-title">💰 家計簿</div>
    <div class="header-month" id="month-nav">
      <button class="month-arrow" onclick="changeMonth(-1)">◀</button>
      <span class="header-month-label" id="month-label"></span>
      <button class="month-arrow" onclick="changeMonth(1)">▶</button>
    </div>
    <button class="header-btn" id="undo-btn" onclick="undoExpense()" title="元に戻す" style="opacity:.35;cursor:default;">↩</button>
    <button class="header-btn" onclick="openCalc()" title="電卓">🧮</button>
    <button class="header-btn" onclick="manualSave()" title="保存">💾</button>
  </header>

  <div class="page-content" id="page-content">

    <!-- 家計簿 -->
    <div id="page-kakeibo" class="page active">
      <div class="summary-strip">
        <div class="sum-item"><div class="sum-label">収入</div><div class="sum-val income" id="total-income">¥0</div></div>
        <div class="sum-item"><div class="sum-label">支出</div><div class="sum-val expense" id="total-expense">¥0</div></div>
        <div class="sum-item"><div class="sum-label">収支</div><div class="sum-val balance" id="total-balance">¥0</div></div>
      </div>
      <div class="sub-tabs">
        <button class="sub-tab active" id="sub-tab-expense" onclick="switchSubTab('expense')">
          <span class="dot" style="background:var(--red)"></span>支出
        </button>
        <button class="sub-tab" id="sub-tab-income" onclick="switchSubTab('income')">
          <span class="dot" style="background:var(--green)"></span>収入
        </button>
      </div>
      <div id="sub-expense">
        <div class="section-card">
          <div class="section-card-header">
            <div class="section-card-title">
              <svg width="12" height="12" viewBox="0 0 12 12"><circle cx="6" cy="6" r="6" fill="#E53935"/></svg>支出明細
            </div>
            <div class="section-card-total expense" id="expense-total">¥0</div>
          </div>
          <div id="expense-rows"></div>
          <button class="add-row-btn" onclick="addExpenseRow()">＋ 行を追加</button>
        </div>
      </div>
      <div id="sub-income" style="display:none">
        <div class="section-card">
          <div class="section-card-header">
            <div class="section-card-title">
              <svg width="12" height="12" viewBox="0 0 12 12"><circle cx="6" cy="6" r="6" fill="#1AAD5E"/></svg>収入一覧
            </div>
            <div class="section-card-total income" id="income-total-cell">¥0</div>
          </div>
          <div id="income-rows"></div>
        </div>
      </div>
    </div>

    <!-- シミュレーター -->
    <div id="page-simulator" class="page">
      <div class="sim-balance-card">
        <div class="sim-balance-label">現在の残高</div>
        <div class="sim-balance-row">
          <input type="number" class="sim-balance-input" id="current-balance" value="77497" oninput="scheduleSimCalc()">
          <span style="font-size:16px;opacity:.8">円</span>
          <button class="sim-recalc-btn" onclick="renderSimulator()">🔄 再計算</button>
        </div>
      </div>
      <div id="sim-info" style="font-size:11px;color:var(--text3);margin-bottom:10px;padding:0 2px;"></div>
      <div id="sim-timeline"></div>
    </div>

    <!-- 設定 -->
    <div id="page-settings" class="page">
      <div class="data-actions">
        <button class="data-action-btn" onclick="downloadData()"><span>⬇</span>書き出し</button>
        <button class="data-action-btn" onclick="document.getElementById('upload-input').click()"><span>⬆</span>読込</button>
        <button class="data-action-btn danger" onclick="confirmClearData()"><span>🗑</span>消去</button>
      </div>
      <input type="file" id="upload-input" accept=".json" style="display:none" onchange="uploadData(event)">
      <div class="save-ts" id="save-ts"></div>
      <div class="settings-section">
        <div class="settings-section-title">クレジットカード</div>
        <div id="cc-settings-rows"></div>
        <button class="settings-add-row" onclick="openEditModal('cc',null)">＋ カードを追加</button>
      </div>
      <div class="settings-section">
        <div class="settings-section-title">定額支払い</div>
        <div id="fixed-settings-rows"></div>
        <button class="settings-add-row" onclick="openEditModal('fixed',null)">＋ 定額支払いを追加</button>
      </div>
      <div class="settings-section">
        <div class="settings-section-title">収入</div>
        <div id="income-settings-rows"></div>
        <button class="settings-add-row" onclick="openEditModal('income',null)">＋ 収入を追加</button>
      </div>
      <button class="settings-page-save" onclick="saveSettings()">💾 設定を保存</button>
    </div>

  </div>

  <nav class="tab-bar">
    <button class="tab-btn active" id="tab-kakeibo" onclick="showPage('kakeibo')">
      <span class="tab-icon">📒</span><span class="tab-label">家計簿</span><span class="tab-dot"></span>
    </button>

<script>
// ======================================================================
// STATE
// ======================================================================
const WEEKDAYS=['日','月','火','水','木','金','土'];
let currentYear=new Date().getFullYear();
let currentMonth=new Date().getMonth();
let currentSubTab='expense';

let monthData={};
let incomeData={};

// ★ カードに closeDay（締め日）を追加。'last' = 末日
// ★ day = 引き落とし日（翌月）
// 重複チェック・シミュレーターは引き落とし日 day で統一
let settings={
  cards:[
    {name:'イオンカード',      closeDay:10,     day:2,  holiday:'next'},
    {name:'JP BANKカード',     closeDay:'last', day:26, holiday:'next'},
    {name:'JALカード',   closeDay:15,     day:10, holiday:'next'},
    {name:'J-WESTカード',      closeDay:15,     day:10, holiday:'next'},
    {name:'Amazon Mastercard', closeDay:'last', day:26, holiday:'next'},
  ],
  fixed:[
    {name:'家賃',day:27,amount:43625,holiday:'next'},
    {name:'大阪ガス',day:27,amount:3000,holiday:'next'},
    {name:'関西電力',day:22,amount:5000,holiday:'next'},
    {name:'楽天mobile',day:27,amount:2000,holiday:'next'},
  ],
  income:[
    {name:'日本学生支援機構',day:11,amount:0,holiday:'prev',defaultAmount:113271},
    {name:'水春',day:15,amount:0,holiday:'prev',defaultAmount:0},
  ]
};

const HOLIDAYS=new Set([
  '2024-01-01','2024-01-08','2024-02-11','2024-02-12','2024-02-23','2024-03-20',
  '2024-04-29','2024-05-03','2024-05-04','2024-05-05','2024-05-06','2024-07-15',
  '2024-08-11','2024-08-12','2024-09-16','2024-09-22','2024-09-23','2024-10-14',
  '2024-11-03','2024-11-04','2024-11-23','2024-12-23',
  '2025-01-01','2025-01-13','2025-02-11','2025-02-23','2025-02-24','2025-03-20',
  '2025-04-29','2025-05-03','2025-05-04','2025-05-05','2025-05-06','2025-07-21',
  '2025-08-11','2025-09-15','2025-09-22','2025-09-23','2025-10-13',
  '2025-11-03','2025-11-23','2025-11-24',
  '2026-01-01','2026-01-12','2026-02-11','2026-02-23','2026-03-20',
  '2026-04-29','2026-05-03','2026-05-04','2026-05-05','2026-05-06','2026-07-20',
  '2026-08-11','2026-09-21','2026-09-22','2026-09-23','2026-10-12',
  '2026-11-03','2026-11-23',
  '2027-01-01','2027-01-11','2027-02-11','2027-02-23','2027-03-21',
  '2027-04-29','2027-05-03','2027-05-04','2027-05-05','2027-07-19',
  '2027-08-11','2027-09-20','2027-09-23','2027-10-11','2027-11-03','2027-11-23',
]);

function isHoliday(d){const k=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;return d.getDay()===0||d.getDay()===6||HOLIDAYS.has(k);}
function adjustDate(year,month,day,mode){const last=new Date(year,month+1,0).getDate();if(day>last)day=last;let d=new Date(year,month,day);if(!isHoliday(d))return d;const step=mode==='next'?86400000:-86400000;while(isHoliday(d))d=new Date(d.getTime()+step);return d;}
function adjustIncomeDate(year,month,day,mode){const last=new Date(year,month+1,0).getDate();if(day>last)day=last;let d=new Date(year,month,day);if(!isHoliday(d))return d;const step=mode==='next'?86400000:-86400000;while(isHoliday(d))d=new Date(d.getTime()+step);return d;}
function fmtDate(d){return `${d.getMonth()+1}/${d.getDate()}（${WEEKDAYS[d.getDay()]}）`;}
function fmtAmt(n){return '¥'+(Math.abs(Math.round(n))).toLocaleString('ja-JP');}
function pad(n){return String(n).padStart(2,'0');}
function getKey(){return `${currentYear}-${pad(currentMonth+1)}`;}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function todayDay(){const now=new Date();if(currentYear===now.getFullYear()&&currentMonth===now.getMonth())return now.getDate();return '';}

// 締め日の表示
function fmtCloseDay(cd){
  if(cd==='last'||cd===0||cd===99)return '末日';
  return `${cd}日`;
}

// ======================================================================
// PAGE / SUB-TAB
// ======================================================================
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  document.getElementById('page-content').scrollTop=0;
  document.getElementById('month-nav').style.display=name==='kakeibo'?'':'none';
  if(name==='simulator')renderSimulator();
  if(name==='settings')renderSettingsPage();
}
function switchSubTab(tab){
  currentSubTab=tab;
  document.getElementById('sub-tab-expense').classList.toggle('active',tab==='expense');
  document.getElementById('sub-tab-income').classList.toggle('active',tab==='income');
  document.getElementById('sub-expense').style.display=tab==='expense'?'':'none';
  document.getElementById('sub-income').style.display=tab==='income'?'':'none';
}

// ======================================================================
// MONTH
// ======================================================================
// ★ 起動時・月切替時のみ日付順ソート（入力中は更新しない）
function sortExpensesByDay(){
  const key=getKey();
  if(!monthData[key]||monthData[key].length===0)return;
  monthData[key].sort((a,b)=>(a.day||0)-(b.day||0));
}

function changeMonth(delta){
  currentMonth+=delta;
  if(currentMonth>11){currentMonth=0;currentYear++;}
  if(currentMonth<0){currentMonth=11;currentYear--;}
  undoStack=[];updateUndoBtn();
  sortExpensesByDay();
  renderKakeibo();
}
function updateMonthLabel(){document.getElementById('month-label').textContent=`${currentYear}年${currentMonth+1}月`;}

// ======================================================================
// KAKEIBO
// ======================================================================
function renderKakeibo(){
  updateMonthLabel();
  renderExpenseRows();
  renderIncomeRows();
  updateSummary();
}

function buildCardOptions(selectedCard){
  let html=`<option value="">カードなし</option>`;
  settings.cards.forEach(c=>{
    const sel=c.name===selectedCard?'selected':'';
    html+=`<option value="${escHtml(c.name)}" ${sel}>${escHtml(c.name)}</option>`;
  });
  return html;
}

function renderExpenseRows(){
  const key=getKey();
  if(!monthData[key])monthData[key]=[];
  const rows=monthData[key];
  const wrap=document.getElementById('expense-rows');
  wrap.innerHTML='';
  rows.forEach((r,i)=>{
    const div=document.createElement('div');
    div.className='expense-row';
    div.innerHTML=`
      <div class="expense-row-top">
        <div class="day-badge"><input type="number" min="1" max="31" value="${r.day||''}" placeholder="日" oninput="updateExpense(${i},'day',this.value)"></div>
        <input class="item-input" type="text" value="${escHtml(r.item||'')}" placeholder="内容..." oninput="updateExpense(${i},'item',this.value)" onblur="checkDuplicate(${i})">
        <button class="del-btn" onclick="deleteExpense(${i})">✕</button>
      </div>
      <div class="expense-row-bottom">
        <select class="card-select" onchange="updateExpenseCard(${i},this.value)">${buildCardOptions(r.card||'')}</select>
        <div class="amount-input-wrap">
          <span class="yen-sym">¥</span>
          <input class="amount-input" type="number" min="0" value="${r.amount||''}" placeholder="0"
            oninput="updateExpenseAmount(${i},this.value)" onblur="checkDuplicate(${i})">
        </div>
      </div>`;
    wrap.appendChild(div);
  });
  updateExpenseTotal();
}

function renderIncomeRows(){
  const key=getKey();
  if(!incomeData[key])incomeData[key]={};
  const wrap=document.getElementById('income-rows');
  wrap.innerHTML='';
  settings.income.forEach(inc=>{
    if(inc.defaultAmount && inc.defaultAmount>0 && !incomeData[key][inc.name]){
      incomeData[key][inc.name]=inc.defaultAmount;
    }
    const amount=incomeData[key][inc.name]||0;
    const div=document.createElement('div');
    div.className='income-row-item';
    div.innerHTML=`
      <div class="income-source-label">${escHtml(inc.name)}</div>
      <div class="amount-input-wrap">
        <span class="yen-sym">¥</span>
        <input class="income-amount-input" type="number" min="0" value="${amount||''}" placeholder="0"
          oninput="updateIncome('${escHtml(inc.name)}',this.value)">
      </div>`;
    wrap.appendChild(div);
  });
  updateIncomeTotalCell();
}

// ======================================================================
// UNDO STACK（軽量：最大10スナップショット、JSON文字列で保持）
// ======================================================================
const UNDO_MAX=10;
let undoStack=[];
function pushUndo(){
  const key=getKey();
  const snap=JSON.stringify(monthData[key]||[]);
  if(undoStack.length&&undoStack[undoStack.length-1]===snap)return;
  undoStack.push(snap);
  if(undoStack.length>UNDO_MAX)undoStack.shift();
  updateUndoBtn();
}
function updateUndoBtn(){
  const btn=document.getElementById('undo-btn');
  if(!btn)return;
  const ok=undoStack.length>0;
  btn.style.opacity=ok?'1':'0.35';
  btn.style.cursor=ok?'pointer':'default';
}
function undoExpense(){
  if(!undoStack.length)return;
  const key=getKey();
  monthData[key]=JSON.parse(undoStack.pop());
  updateUndoBtn();
  renderExpenseRows();updateSummary();scheduleAutoSave();
  showToast('↩ 元に戻しました');
}

function updateExpense(i,field,val){
  const key=getKey();
  if(!monthData[key])monthData[key]=[];
  pushUndo();
  monthData[key][i][field]=(field==='amount'||field==='day')?(parseFloat(val)||0):val;
  updateExpenseTotal();updateSummary();scheduleAutoSave();
}
// カード変更：undoスタック保存＋重複チェック
function updateExpenseCard(i,val){
  const key=getKey();
  if(!monthData[key])monthData[key]=[];
  pushUndo();
  monthData[key][i].card=val;
  updateExpenseTotal();updateSummary();scheduleAutoSave();
  checkDuplicate(i);
}
function updateExpenseAmount(i,val){
  const key=getKey();
  if(!monthData[key])monthData[key]=[];
  pushUndo();
  monthData[key][i].amount=parseFloat(val)||0;
  updateExpenseTotal();updateSummary();scheduleAutoSave();
}

// ======================================================================
// ★ 重複チェック
// 条件：同じカード名 ＋ 引き落とし日(day)が同じ ＋ 内容(item)が同じ
// ======================================================================
// 利用日と締め日から「引き落とし月オフセット」を返す
// 締め日以内の利用 → 翌月引落(offset=1)、締め日超の利用 → 翌々月引落(offset=2)
// closeDay='last'(末日締め) の場合は常にoffset=1（当月末まで全て翌月引落）
function getPayMonthOffset(useDay, closeDay){
  if(closeDay==='last'||closeDay===0||closeDay===99) return 1;
  return (useDay <= closeDay) ? 1 : 2;
}

function checkDuplicate(i){
  const key=getKey();
  const rows=monthData[key]||[];
  const cur=rows[i];
  if(!cur||!cur.item||!cur.card||!cur.amount)return;

  const curCard=settings.cards.find(c=>c.name===cur.card);
  if(!curCard)return;
  const curOffset=getPayMonthOffset(cur.day||1, curCard.closeDay);

  for(let j=0;j<rows.length;j++){
    if(j===i)continue;
    const prev=rows[j];
    if(!prev||!prev.item||!prev.card)continue;
    if(prev.card!==cur.card)continue;
    if(prev.item.trim()!==cur.item.trim())continue;

    const prevCard=settings.cards.find(c=>c.name===prev.card);
    if(!prevCard)continue;
    const prevOffset=getPayMonthOffset(prev.day||1, prevCard.closeDay);

    // 引き落とし月（offset）が同じ場合のみ重複とみなす
    if(prevOffset===curOffset){
      const payMonthLabel=`翌${curOffset===2?'々':''}月${curCard.day}日引落`;
      const msgEl=document.getElementById('dup-msg');
      msgEl.innerHTML=`<span class="dup-highlight">${escHtml(prev.item)}</span>（${escHtml(prev.card)}・${payMonthLabel}）が既に入力されています。<br><br>
        既存：<span class="dup-highlight">${fmtAmt(prev.amount)}</span>　追加：<span class="dup-highlight">${fmtAmt(cur.amount)}</span><br>
        合計：<span class="dup-highlight">${fmtAmt(prev.amount+cur.amount)}</span><br><br>
        金額を合算しますか？`;
      document.getElementById('dup-yes-btn').onclick=()=>{
        rows[j].amount=prev.amount+cur.amount;
        rows.splice(i,1);
        closeModal('dup-modal');
        renderExpenseRows();updateSummary();scheduleAutoSave();
        showToast('合算しました','success');
      };
      document.getElementById('dup-no-btn').onclick=()=>closeModal('dup-modal');
      document.getElementById('dup-modal').classList.add('open');
      return;
    }
  }
}

function updateIncome(sourceName,val){
  const key=getKey();
  if(!incomeData[key])incomeData[key]={};
  incomeData[key][sourceName]=parseFloat(val)||0;
  updateIncomeTotalCell();updateSummary();scheduleAutoSave();
}
function addExpenseRow(){
  const key=getKey();
  if(!monthData[key])monthData[key]=[];
  pushUndo();
  const defaultCard=settings.cards[0]?.name||'';
  monthData[key].push({day:todayDay(),item:'',card:defaultCard,amount:0});
  renderExpenseRows();scheduleAutoSave();
}
function deleteExpense(i){
  const key=getKey();
  if(!monthData[key])return;
  pushUndo();
  monthData[key].splice(i,1);
  renderExpenseRows();updateSummary();scheduleAutoSave();
}
function updateExpenseTotal(){
  const key=getKey();
  const rows=monthData[key]||[];
  const total=rows.reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
  document.getElementById('expense-total').textContent=fmtAmt(total);
}
function updateIncomeTotalCell(){
  const key=getKey();
  let total=0;
  if(incomeData[key])Object.values(incomeData[key]).forEach(v=>total+=parseFloat(v)||0);
  document.getElementById('income-total-cell').textContent=fmtAmt(total);
}
function updateSummary(){
  const key=getKey();
  let totalExp=0,totalInc=0;
  (monthData[key]||[]).forEach(r=>totalExp+=parseFloat(r.amount)||0);
  if(incomeData[key])Object.values(incomeData[key]).forEach(v=>totalInc+=parseFloat(v)||0);
  document.getElementById('total-income').textContent=fmtAmt(totalInc);
  document.getElementById('total-expense').textContent=fmtAmt(totalExp);
  const bal=totalInc-totalExp;
  const el=document.getElementById('total-balance');
  el.textContent=(bal>=0?'+':'-')+fmtAmt(Math.abs(bal));
  el.style.color=bal>=0?'var(--green)':'var(--red)';
}

// ======================================================================
// SIMULATOR
// ★ 今日から3ヶ月分（今月・来月・再来月）を常に対象に含める
// ★ クレジットカードの支出は「翌月の引き落とし日」に計上
// ======================================================================

// ★★ 修正箇所：今日から3ヶ月分のキーを常に含める
function getSimMonths(){
  const now=new Date();
  const set=new Set();

  // 今日から3ヶ月分（今月・来月・再来月）を固定で追加
  for(let i=0;i<3;i++){
    let y=now.getFullYear();
    let m=now.getMonth()+i;
    if(m>11){m-=12;y++;}
    set.add(`${y}-${pad(m+1)}`);
  }

  // monthDataに入力済みデータがある月も追加（シミュレーターの精度向上のため）
  Object.keys(monthData).forEach(k=>{
    if((monthData[k]||[]).length>0)set.add(k);
  });
  Object.keys(incomeData).forEach(k=>{
    if(Object.keys(incomeData[k]||{}).length>0)set.add(k);
  });

  // ★ シミュレーターには今月〜3ヶ月後の範囲のみ表示（過去月は除外）
  // 引き落とし日の計算のためにカード利用月（monthData）は全て参照するが、
  // イベント表示は今日以降のみに絞る（buildSimEvents内のtodayMidnight判定で制御）
  return [...set].sort();
}

// 翌月の引き落とし日を取得
function getNextMonthPayDate(billingYear,billingMonth,payDay,holiday){
  let pm=billingMonth+1;
  let py=billingYear;
  if(pm>11){pm=0;py++;}
  return adjustDate(py,pm,payDay,holiday);
}

// ★★ 修正箇所：表示上限を「今日から3ヶ月後の月末」に制限
function buildSimEvents(startBal){
  const events=[];
  const today=new Date();
  const todayMidnight=new Date(today.getFullYear(),today.getMonth(),today.getDate());

  // 3ヶ月後の月末を表示上限として計算
  let limitMonth=today.getMonth()+3;
  let limitYear=today.getFullYear();
  if(limitMonth>11){limitMonth-=12;limitYear++;}
  // 3ヶ月後の月末日
  const limitDate=new Date(limitYear,limitMonth+1,0); // 月末日（翌月0日）

  events.push({date:today,name:'現在残高',amount:0,type:'start',balance:startBal});

  getSimMonths().forEach(mk=>{
    const[y,m]=mk.split('-').map(Number);
    const month=m-1;
    const rows=monthData[mk]||[];

    // ★ クレジットカード：当月利用分 → 翌月の引き落とし日に計上
    settings.cards.forEach(c=>{
      const payDate=getNextMonthPayDate(y,month,c.day,c.holiday);
      const payMidnight=new Date(payDate.getFullYear(),payDate.getMonth(),payDate.getDate());
      // 今日より前、または表示上限より後の引き落とし日はスキップ
      if(payMidnight<todayMidnight)return;
      if(payMidnight>limitDate)return;
      const total=rows.filter(r=>r.card===c.name).reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
      if(total>0)events.push({date:payDate,name:c.name,amount:-total,type:'expense'});
    });

    // カード未設定の支出：その月の1日が今日以降かつ上限以内のみ
    const noCardDate=new Date(y,month,1);
    if(noCardDate>=todayMidnight&&noCardDate<=limitDate){
      const noCard=rows.filter(r=>!r.card||r.card==='').reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
      if(noCard>0)events.push({date:noCardDate,name:'カード未設定',amount:-noCard,type:'expense'});
    }

    // 定額支払い：引き落とし日が今日以降かつ上限以内のみ
    settings.fixed.forEach(f=>{
      if(f.amount>0){
        const adj=adjustDate(y,month,f.day,f.holiday);
        const adjMidnight=new Date(adj.getFullYear(),adj.getMonth(),adj.getDate());
        if(adjMidnight<todayMidnight)return;
        if(adjMidnight>limitDate)return;
        events.push({date:adj,name:f.name,amount:-f.amount,type:'expense'});
      }
    });

    // 収入：振り込み日が今日以降かつ上限以内のみ
    settings.income.forEach(inc=>{
      const adj=adjustIncomeDate(y,month,inc.day,inc.holiday);
      const adjMidnight=new Date(adj.getFullYear(),adj.getMonth(),adj.getDate());
      if(adjMidnight<todayMidnight)return;
      if(adjMidnight>limitDate)return;
      let amount=0;
      if(incomeData[mk]?.[inc.name])amount=parseFloat(incomeData[mk][inc.name])||0;
      if(!amount&&inc.defaultAmount&&inc.defaultAmount>0)amount=inc.defaultAmount;
      if(!amount&&inc.amount>0)amount=inc.amount;
      if(amount>0)events.push({date:adj,name:inc.name,amount:amount,type:'income'});
      else events.push({date:adj,name:inc.name+'（金額未設定）',amount:0,type:'income_unknown'});
    });
  });

  events.sort((a,b)=>{
    if(a.type==='start')return -1;if(b.type==='start')return 1;
    const dd=a.date-b.date;if(dd!==0)return dd;
    if(a.type==='income'&&b.type!=='income')return -1;
    if(b.type==='income'&&a.type!=='income')return 1;
    return 0;
  });
  let bal=startBal;
  events.forEach(e=>{if(e.type!=='start'){bal+=e.amount;e.balance=bal;}});
  return events;
}

// ★★ 修正箇所：sim-info に「今日〜3ヶ月後まで」の範囲を表示
function renderSimulator(){
  const startBal=parseFloat(document.getElementById('current-balance').value)||0;
  const now=new Date();
  let limitMonth=now.getMonth()+3;
  let limitYear=now.getFullYear();
  if(limitMonth>11){limitMonth-=12;limitYear++;}
  const rangeLabel=`${now.getFullYear()}年${now.getMonth()+1}月〜${limitYear}年${limitMonth+1}月（3ヶ月分）`;
  document.getElementById('sim-info').textContent=`表示期間：${rangeLabel}`;

  const events=buildSimEvents(startBal);
  let html='<div class="sim-list-card">';
  let lastMonth=null;
  events.forEach(e=>{
    if(e.type!=='start'){
      const mk=`${e.date.getFullYear()}-${pad(e.date.getMonth()+1)}`;
      if(mk!==lastMonth){lastMonth=mk;html+=`<div class="sim-month-header">${e.date.getFullYear()}年${e.date.getMonth()+1}月</div>`;}
    }
    const isStart=e.type==='start';
    let rowCls='sim-row';
    if(isStart)rowCls+=' today-row';
    if(!isStart&&e.balance<0)rowCls+=' warn-row';
    const dateStr=isStart?fmtDate(e.date)+'　現在':fmtDate(e.date);
    let amountStr='',amtCls='sim-amount';
    if(e.type==='start'){amountStr='';}
    else if(e.type==='income'||e.type==='income_unknown'){amountStr=e.amount>0?`+${fmtAmt(e.amount)}`:'金額未設定';amtCls+=' pos';}
    else{amountStr=`−${fmtAmt(Math.abs(e.amount))}`;amtCls+=' neg';}
    const balCls='sim-bal'+(e.balance<0?' warn':'');
    html+=`<div class="${rowCls}"><div class="sim-date">${dateStr}</div><div class="sim-name">${escHtml(e.name)}</div><div class="sim-bal-wrap"><div class="${amtCls}">${amountStr}</div><div class="${balCls}">${fmtAmt(e.balance)}</div></div></div>`;
  });
  html+='</div>';
  document.getElementById('sim-timeline').innerHTML=html;
}

  const name=document.getElementById('em-name')?.value.trim();
  const day=parseInt(document.getElementById('em-day')?.value)||25;
  const holiday=document.getElementById('em-holiday')?.value||'next';

// ======================================================================
// CALCULATOR
// ======================================================================
let calcState={expr:'',val:'0',prevVal:'',op:'',justCalced:false};
let calcTargetCallback=null;

function openCalc(callback){
  calcState={expr:'',val:'0',prevVal:'',op:'',justCalced:false};
  calcTargetCallback=callback||null;
  updateCalcDisplay();
  const useBtn=document.getElementById('calc-use-btn');
  useBtn.style.display=callback?'':'none';
  document.getElementById('calc-modal').classList.add('open');
}
function updateCalcDisplay(){
  document.getElementById('calc-expr').textContent=calcState.expr;
  const num=parseFloat(calcState.val);
  document.getElementById('calc-val').textContent=isNaN(num)?calcState.val:num.toLocaleString('ja-JP');
}
function calcNum(n){
  if(calcState.justCalced){calcState.val='0';calcState.expr='';calcState.justCalced=false;}
  if(n==='.'){if(calcState.val.includes('.'))return;calcState.val=(calcState.val==='0'||calcState.val==='')?'0.':calcState.val+'.';}
  else{calcState.val=(calcState.val==='0')?n:calcState.val+n;}
  updateCalcDisplay();
}
function calcOp(op){
  if(calcState.op&&calcState.prevVal!==''){
    calcState.val=String(doCalc(parseFloat(calcState.prevVal),parseFloat(calcState.val),calcState.op));
  }
  calcState.expr=calcState.val+' '+op;
  calcState.prevVal=calcState.val;
  calcState.val='0';calcState.op=op;calcState.justCalced=false;
  updateCalcDisplay();
}
function calcEq(){
  if(!calcState.op||calcState.prevVal==='')return;
  const result=doCalc(parseFloat(calcState.prevVal),parseFloat(calcState.val),calcState.op);
  calcState.expr=calcState.prevVal+' '+calcState.op+' '+calcState.val+' =';
  calcState.val=String(result);
  calcState.prevVal='';calcState.op='';calcState.justCalced=true;
  updateCalcDisplay();
}
function doCalc(a,b,op){
  if(op==='+'||op==='+')return Math.round((a+b)*1e10)/1e10;
  if(op==='−')return Math.round((a-b)*1e10)/1e10;
  if(op==='×')return Math.round((a*b)*1e10)/1e10;
  if(op==='÷')return b!==0?Math.round((a/b)*1e10)/1e10:0;
  return b;
}
function calcFn(fn){
  if(fn==='clear'){calcState={expr:'',val:'0',prevVal:'',op:'',justCalced:false};}
  else if(fn==='sign'){calcState.val=String(-parseFloat(calcState.val||0));}
  else if(fn==='pct'){calcState.val=String(parseFloat(calcState.val||0)/100);}
  updateCalcDisplay();
}
function calcUse(){
  if(calcTargetCallback){const v=parseFloat(calcState.val)||0;calcTargetCallback(v);}
  closeModal('calc-modal');
}

let pendingImport=null;
function uploadData(event){
  const file=event.target.files[0];if(!file)return;event.target.value='';
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const p=JSON.parse(e.target.result);
      if(!p.monthData&&!p.incomeData&&!p.settings){showToast('有効なファイルではありません','error');return;}
      pendingImport=p;
      let preview='';
      if(p.exportedAt){const d=new Date(p.exportedAt);preview+=`エクスポート：${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}<br>`;}
      if(p.monthData){const ks=Object.keys(p.monthData).sort();preview+=`家計簿：${ks.length}ヶ月（${ks[0]||''}〜${ks[ks.length-1]||''}）<br>`;}
      if(p.settings?.cards)preview+=`カード：${p.settings.cards.length}枚<br>`;
      if(p.settings?.fixed)preview+=`定額支払い：${p.settings.fixed.length}件<br>`;
      if(p.settings?.income)preview+=`収入：${p.settings.income.length}件`;
      document.getElementById('import-preview').innerHTML=preview||'（データなし）';
      document.getElementById('import-confirm-btn').onclick=applyImport;
      document.getElementById('import-confirm-modal').classList.add('open');
    }catch{showToast('ファイル読み込み失敗','error');}
  };
  reader.readAsText(file,'utf-8');
}
function applyImport(){
  if(!pendingImport)return;const p=pendingImport;
  if(p.monthData)monthData=p.monthData;
  if(p.incomeData)incomeData=p.incomeData;
  if(p.settings)settings=p.settings;
  if(p.simBalance){const el=document.getElementById('current-balance');if(el)el.value=p.simBalance;}
  closeModal('import-confirm-modal');pendingImport=null;
  saveToStorage();renderKakeibo();renderSettingsPage();

}

  // 起動時：全月のデータを日付順にソートしてから描画
  Object.keys(monthData).forEach(k=>{
    if(monthData[k]&&monthData[k].length>0){
      monthData[k].sort((a,b)=>(a.day||0)-(b.day||0));
    }
  });
  renderKakeibo();
}

init();
</script>
